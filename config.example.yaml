listen: ":8080"
update_interval: 180m
cache_dir: "./cache"
video_retention_days: 7
max_pages: 1
feeds:
  - name: "vocaloid"
    title: "VOCALOID Latest"
    description: "Latest VOCALOID videos from Nicovideo"
    tags:
      - "VOCALOID"
      - "初音ミク"
    sorts:
      - id: "latest"
        sort: "registeredAt"
        title: "最新投稿"
      - id: "popular"
        sort: "viewCount"
        title: "人気順"
  - name: "game_commentary"
    title: "Game Commentary"
    description: "Latest game commentary videos"
    tags:
      - "ゲーム実況"
