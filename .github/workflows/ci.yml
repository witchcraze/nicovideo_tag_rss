name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -v -race ./...

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l . || true)
          if [ -n "$unformatted" ]; then
            echo "gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

  staticcheck:
    name: staticcheck (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install staticcheck
        run: |
          export PATH="$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  golangci-lint:
    name: golangci-lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH 2>/dev/null || echo $HOME/go)/bin v1.59.0
          export PATH="$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"

      - name: Run golangci-lint (error-level fail)
        run: |
          export PATH="$(go env GOPATH 2>/dev/null || echo $HOME/go)/bin:$PATH"
          # Run with JSON output and do not fail by default; later fail only if any issue has severity "error".
          golangci-lint run --out-format json --timeout 5m --issues-exit-code 0 2>/dev/null | tee golangci-report.json || true
          if grep -qi '"severity"[[:space:]]*:[[:space:]]*"error"' golangci-report.json; then
            echo "golangci-lint found error-level issues:"; jq . < golangci-report.json || cat golangci-report.json
            exit 1
          fi
          echo "No error-level issues found"

  build-and-push-image:
    needs: test
    runs-on: ubuntu-latest
    # Only push to GHCR on main branch pushes, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
